<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Delhi Civic Sense</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #07070d;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #f1f5f9;
  background-image: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.06) 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 50%, rgba(6,182,212,0.04) 0%, transparent 50%);
}
.card {
  background: rgba(255,255,255,0.02);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px;
  padding: 40px 36px;
  width: 380px;
  max-width: 90vw;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.card .logo {
  font-size: 28px;
  text-align: center;
  margin-bottom: 4px;
  color: #f59e0b;
}
.card h1 {
  font-size: 20px;
  font-weight: 800;
  text-align: center;
  margin-bottom: 4px;
  background: linear-gradient(135deg, #fff 50%, #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.card .subtitle {
  text-align: center;
  font-size: 12px;
  color: #64748b;
  margin-bottom: 28px;
}
.form-group { margin-bottom: 18px; }
.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
}
.form-group input {
  width: 100%;
  padding: 12px 14px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  color: #f1f5f9;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus { border-color: rgba(99,102,241,0.3); }
.form-group input::placeholder { color: #475569; }
.btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #6366f1, #4f46e5);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(99,102,241,0.2); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.error {
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.15);
  color: #fca5a5;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 12px;
  margin-bottom: 16px;
  display: none;
}
.error.visible { display: block; }
.footer-link {
  text-align: center;
  margin-top: 18px;
  font-size: 12px;
  color: #64748b;
}
.footer-link a { color: #818cf8; text-decoration: none; }
.footer-link a:hover { text-decoration: underline; }
.back-link {
  text-align: center;
  margin-top: 12px;
}
.back-link a { color: #475569; text-decoration: none; font-size: 11px; }
.back-link a:hover { color: #64748b; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">&#9733;</div>
  <h1>Welcome Back</h1>
  <div class="subtitle">Sign in to your Civic Sense account</div>
  <div class="error" id="errorMsg"></div>
  <form id="loginForm">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn" id="submitBtn">Sign In</button>
  </form>
  <div class="footer-link">Don't have an account? <a href="/register">Create one</a></div>
  <div class="back-link"><a href="/">&#8592; Back to chat</a></div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorMsg');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  err.classList.remove('visible');

  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      err.textContent = data.detail || 'Login failed';
      err.classList.add('visible');
      return;
    }
    localStorage.setItem('token', data.token);
    localStorage.setItem('username', data.username);
    window.location.href = '/';
  } catch (e) {
    err.textContent = 'Network error. Is the server running?';
    err.classList.add('visible');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});
</script>
</body>
</html>
